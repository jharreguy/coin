<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Juan Manuel site Mercado Cripto</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #0d1117; color: #e6edf3; min-height: 100vh; }
    #app { max-width: 1200px; margin: 0 auto; padding: 1.5rem 1rem; }
    .header { padding-bottom: 1rem; border-bottom: 0.5px solid #30363d; margin-bottom: 1rem; }
    .header h1 { font-size: 22px; font-weight: 500; color: #e6edf3; }
    .header p { font-size: 13px; color: #8b949e; margin-top: 4px; }
    .controls { display: flex; align-items: center; gap: 10px; margin-bottom: 1rem; flex-wrap: wrap; }
    .period-btn { font-size: 12px; padding: 5px 12px; border-radius: 20px; border: 0.5px solid #30363d; background: transparent; color: #8b949e; cursor: pointer; transition: all .15s; }
    .period-btn.active { background: #1f3a5f; color: #58a6ff; border-color: transparent; font-weight: 500; }
    .period-btn:hover:not(.active) { border-color: #58a6ff; color: #e6edf3; }
    .search-box { margin-left: auto; padding: 6px 12px; border: 0.5px solid #30363d; border-radius: 20px; background: #161b22; color: #e6edf3; font-size: 13px; width: 200px; outline: none; }
    .search-box:focus { border-color: #58a6ff; }
    .stats-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 1.25rem; }
    .stat-card { background: #161b22; border: 0.5px solid #30363d; border-radius: 8px; padding: .75rem 1rem; }
    .stat-label { font-size: 11px; color: #8b949e; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 4px; }
    .stat-value { font-size: 16px; font-weight: 500; color: #e6edf3; }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
    thead th { font-size: 11px; font-weight: 500; color: #8b949e; text-transform: uppercase; letter-spacing: .04em; padding: 8px 10px; border-bottom: 0.5px solid #30363d; text-align: right; cursor: pointer; white-space: nowrap; }
    thead th:first-child, thead th:nth-child(2) { text-align: left; }
    thead th:hover { color: #e6edf3; }
    thead th.sorted { color: #58a6ff; }
    tbody tr { border-bottom: 0.5px solid #21262d; transition: background .1s; }
    tbody tr:hover { background: #161b22; }
    tbody td { padding: 10px; text-align: right; color: #e6edf3; vertical-align: middle; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    tbody td:first-child, tbody td:nth-child(2) { text-align: left; }
    .rank { color: #8b949e; font-size: 12px; width: 32px; }
    .coin-info { display: flex; align-items: center; gap: 8px; }
    .coin-icon { width: 28px; height: 28px; border-radius: 50%; background: #21262d; flex-shrink: 0; }
    .coin-name { font-weight: 500; font-size: 13px; }
    .coin-sym { font-size: 11px; color: #8b949e; text-transform: uppercase; margin-top: 1px; }
    .pos { color: #3fb950; }
    .neg { color: #f85149; }
    .sparkline { width: 80px; height: 32px; }
    .price-main { font-weight: 500; }
    .mcap, .vol { color: #8b949e; }
    .loading { text-align: center; padding: 3rem; color: #8b949e; font-size: 14px; }
    .error-msg { text-align: center; padding: 2rem; color: #f85149; font-size: 14px; }
    .last-updated { font-size: 11px; color: #8b949e; text-align: right; margin-top: .75rem; }
    th[data-col] .sort-arrow { margin-left: 4px; opacity: 0.4; }
    th[data-col].sorted .sort-arrow { opacity: 1; }
    .col-rank { width: 40px; }
    .col-name { width: 160px; }
    .col-price { width: 110px; }
    .col-change { width: 80px; }
    .col-mcap { width: 130px; }
    .col-vol { width: 130px; }
    .col-spark { width: 90px; }
  </style>
</head>
<body>
  <div id="app">
    <div class="header">
      <h1>Mercado cripto by juan manuel</h1>
      <p id="global-summary">Cargando datos del mercado...</p>
    </div>
    <div class="stats-bar" id="stats-bar"></div>
    <div class="controls">
      <span style="font-size:12px;color:#8b949e;font-weight:500;">Período:</span>
      <button class="period-btn active" data-period="24h">24 horas</button>
      <button class="period-btn" data-period="7d">7 días</button>
      <button class="period-btn" data-period="30d">30 días</button>
      <button class="period-btn" data-period="1y">1 año</button>
      <input class="search-box" id="search" placeholder="Buscar moneda..." type="text" />
    </div>
    <div class="table-wrap">
      <table id="crypto-table">
        <thead>
          <tr>
            <th class="col-rank">#</th>
            <th class="col-name" data-col="name">Moneda <span class="sort-arrow">↕</span></th>
            <th class="col-price" data-col="price">Precio <span class="sort-arrow">↕</span></th>
            <th class="col-change sorted" data-col="change">Cambio <span class="sort-arrow">↓</span></th>
            <th class="col-mcap" data-col="mcap">Cap. mercado <span class="sort-arrow">↕</span></th>
            <th class="col-vol" data-col="vol">Volumen 24h <span class="sort-arrow">↕</span></th>
            <th class="col-spark">7 días</th>
          </tr>
        </thead>
        <tbody id="table-body">
          <tr><td colspan="7" class="loading">Cargando datos del mercado...</td></tr>
        </tbody>
      </table>
    </div>
    <p class="last-updated" id="last-updated"></p>
  </div>

  <script>
    (function () {
      let allCoins = [];
      let period = '24h';
      let sortCol = 'mcap';
      let sortDir = 1;
      let searchQ = '';
      let globalData = null;

      const periodKey = {
        '24h': 'price_change_percentage_24h',
        '7d': 'price_change_percentage_7d_in_currency',
        '30d': 'price_change_percentage_30d_in_currency',
        '1y': 'price_change_percentage_1y_in_currency'
      };

      function fmt(n) {
        if (n === null || n === undefined || isNaN(n)) return '—';
        if (Math.abs(n) >= 1e12) return '$' + (n / 1e12).toFixed(2) + 'T';
        if (Math.abs(n) >= 1e9)  return '$' + (n / 1e9).toFixed(2) + 'B';
        if (Math.abs(n) >= 1e6)  return '$' + (n / 1e6).toFixed(2) + 'M';
        return '$' + n.toLocaleString('es-AR', { maximumFractionDigits: 2 });
      }

      function fmtPrice(n) {
        if (n === null || n === undefined) return '—';
        if (n >= 1000)   return '$' + n.toLocaleString('es-AR', { maximumFractionDigits: 2 });
        if (n >= 1)      return '$' + n.toFixed(4);
        if (n >= 0.0001) return '$' + n.toFixed(6);
        return '$' + n.toExponential(3);
      }

      function fmtPct(n) {
        if (n === null || n === undefined || isNaN(n)) return '—';
        const s = (n >= 0 ? '+' : '') + n.toFixed(2) + '%';
        return `<span class="${n >= 0 ? 'pos' : 'neg'}">${s}</span>`;
      }

      function fmtNum(n) {
        if (!n) return '—';
        if (n >= 1e12) return '$' + (n / 1e12).toFixed(2) + 'T';
        if (n >= 1e9)  return '$' + (n / 1e9).toFixed(2) + 'B';
        if (n >= 1e6)  return '$' + (n / 1e6).toFixed(2) + 'M';
        return '$' + n.toLocaleString();
      }

      function sparkSVG(prices, change) {
        if (!prices || prices.length < 2) return '';
        const mn = Math.min(...prices), mx = Math.max(...prices), rng = mx - mn || 1;
        const w = 80, h = 32;
        const pts = prices.map((v, i) =>
          `${(i / (prices.length - 1) * w).toFixed(1)},${(h - (v - mn) / rng * (h - 4) - 2).toFixed(1)}`
        ).join(' ');
        const col = (change >= 0) ? '#3fb950' : '#f85149';
        return `<svg class="sparkline" viewBox="0 0 ${w} ${h}">
          <polyline points="${pts}" fill="none" stroke="${col}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>`;
      }

      function renderStats() {
        if (!globalData) return;
        const d = globalData.data;
        const mcap  = d.total_market_cap?.usd;
        const vol   = d.total_volume?.usd;
        const btcD  = d.market_cap_percentage?.btc;
        const ethD  = d.market_cap_percentage?.eth;
        const coins = d.active_cryptocurrencies;
        document.getElementById('stats-bar').innerHTML = `
          <div class="stat-card"><div class="stat-label">Cap. total</div><div class="stat-value">${fmtNum(mcap)}</div></div>
          <div class="stat-card"><div class="stat-label">Volumen 24h</div><div class="stat-value">${fmtNum(vol)}</div></div>
          <div class="stat-card"><div class="stat-label">Dom. BTC</div><div class="stat-value">${btcD?.toFixed(1) || '—'}%</div></div>
          <div class="stat-card"><div class="stat-label">Dom. ETH</div><div class="stat-value">${ethD?.toFixed(1) || '—'}%</div></div>
          <div class="stat-card"><div class="stat-label">Monedas activas</div><div class="stat-value">${coins?.toLocaleString() || '—'}</div></div>
        `;
        const pctChange = d.market_cap_change_percentage_24h_usd || 0;
        document.getElementById('global-summary').innerHTML =
          `Cap. de mercado global: <strong>${fmtNum(mcap)}</strong> — Cambio 24h: <span class="${pctChange >= 0 ? 'pos' : 'neg'}">${pctChange >= 0 ? '+' : ''}${pctChange.toFixed(2)}%</span>`;
      }

      function renderTable() {
        const pKey = periodKey[period];
        let coins = allCoins.filter(c => {
          if (!searchQ) return true;
          const q = searchQ.toLowerCase();
          return c.name.toLowerCase().includes(q) || c.symbol.toLowerCase().includes(q);
        });

        coins = [...coins].sort((a, b) => {
          let va, vb;
          if (sortCol === 'name') {
            return sortDir * (a.name < b.name ? -1 : 1);
          } else if (sortCol === 'price') {
            va = a.current_price || 0; vb = b.current_price || 0;
          } else if (sortCol === 'change') {
            va = a[pKey] || 0; vb = b[pKey] || 0;
          } else if (sortCol === 'mcap') {
            va = a.market_cap || 0; vb = b.market_cap || 0;
          } else if (sortCol === 'vol') {
            va = a.total_volume || 0; vb = b.total_volume || 0;
          } else {
            return (a.market_cap_rank || 999) - (b.market_cap_rank || 999);
          }
          return sortDir * (vb - va);
        });

        const tbody = document.getElementById('table-body');
        if (coins.length === 0) {
          tbody.innerHTML = '<tr><td colspan="7" class="loading">No se encontraron resultados</td></tr>';
          return;
        }

        tbody.innerHTML = coins.map((c, i) => {
          const pct  = c[pKey];
          const spark = sparkSVG(c.sparkline_in_7d?.price, c.price_change_percentage_24h);
          return `<tr>
            <td class="rank">${c.market_cap_rank || i + 1}</td>
            <td>
              <div class="coin-info">
                <img class="coin-icon" src="${c.image}" alt="${c.symbol}" loading="lazy" onerror="this.style.opacity=0.3" />
                <div>
                  <div class="coin-name">${c.name}</div>
                  <div class="coin-sym">${c.symbol}</div>
                </div>
              </div>
            </td>
            <td class="price-main">${fmtPrice(c.current_price)}</td>
            <td>${fmtPct(pct)}</td>
            <td class="mcap">${fmt(c.market_cap)}</td>
            <td class="vol">${fmt(c.total_volume)}</td>
            <td>${spark}</td>
          </tr>`;
        }).join('');

        document.getElementById('last-updated').textContent =
          'Actualizado: ' + new Date().toLocaleTimeString('es-AR');
      }

      function updateSortUI() {
        document.querySelectorAll('thead th[data-col]').forEach(th => {
          th.classList.remove('sorted');
          const arrow = th.querySelector('.sort-arrow');
          if (th.dataset.col === sortCol) {
            th.classList.add('sorted');
            if (arrow) arrow.textContent = sortDir === 1 ? '↓' : '↑';
          } else {
            if (arrow) arrow.textContent = '↕';
          }
        });
      }

      async function fetchGlobal() {
        try {
          const r = await fetch('https://api.coingecko.com/api/v3/global');
          if (r.ok) { globalData = await r.json(); renderStats(); }
        } catch (e) { console.warn('No se pudo cargar datos globales', e); }
      }

      async function fetchCoins() {
        try {
          const url = 'https://api.coingecko.com/api/v3/coins/markets' +
            '?vs_currency=usd&order=market_cap_desc&per_page=100&page=1' +
            '&sparkline=true&price_change_percentage=24h,7d,30d,1y&locale=es';
          const r = await fetch(url);
          if (!r.ok) throw new Error('HTTP ' + r.status);
          allCoins = await r.json();
          renderTable();
        } catch (e) {
          document.getElementById('table-body').innerHTML =
            '<tr><td colspan="7" class="error-msg">No se pudieron cargar los datos. La API de CoinGecko puede tener límite de peticiones. Esperá unos segundos y recargá la página.</td></tr>';
        }
      }

      document.querySelectorAll('.period-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          period   = btn.dataset.period;
          sortCol  = 'change';
          sortDir  = 1;
          updateSortUI();
          renderTable();
        });
      });

      document.querySelectorAll('thead th[data-col]').forEach(th => {
        th.addEventListener('click', () => {
          const col = th.dataset.col;
          if (sortCol === col) sortDir *= -1;
          else { sortCol = col; sortDir = 1; }
          updateSortUI();
          renderTable();
        });
      });

      document.getElementById('search').addEventListener('input', e => {
        searchQ = e.target.value.trim();
        renderTable();
      });

      fetchGlobal();
      fetchCoins();
    })();
  </script>
</body>
</html>
